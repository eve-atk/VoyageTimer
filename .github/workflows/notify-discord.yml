name: Discord Arrival Notify

on:
  schedule:
    - cron: '2/5 * * * *'
  workflow_dispatch:

concurrency:
  group: discord-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Call notify endpoint
        env:
          NOTIFY_API_URL: ${{ secrets.NOTIFY_API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$NOTIFY_API_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "NOTIFY_API_URL または CRON_SECRET が未設定です。"
            exit 1
          fi

          response=$(curl --silent --show-error --fail-with-body \
            --retry 2 --retry-delay 2 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$NOTIFY_API_URL")

          echo "notify result: $response"
